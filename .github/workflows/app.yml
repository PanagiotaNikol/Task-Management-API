# Yaml file for GitHub Actions workflow
name: Python Flask API CI

# όποτε γίνεται push ή pull request στο main branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest  

    steps:
      # Κάνουμε checkout τον κώδικα από το repository
      - name: Checkout repository
        uses: actions/checkout@v3

      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Εγκαθιστούμε Flask και pytest
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask pytest

      # Εκτελούμε τα unit tests
      - name: Run tests
        run: |
          pytest


